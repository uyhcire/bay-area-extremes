<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Site · Bay Area Extremes</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 20%, #1e3a5f, #0a0f1e 60%);
      color: #e8eef7;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 540px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(8px);
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7fd1ff;
      border: 1px solid rgba(127,209,255,0.3);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 1.25rem;
    }
    p { color: #9fb0c8; line-height: 1.6; margin-top: 0.75rem; }
    .meta { margin-top: 1.5rem; font-size: 0.85rem; color: #6b7c96; }
    code { background: rgba(255,255,255,0.08); padding: 0.1rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Deployed on Vercel</span>
    <h1>It works! 🚀</h1>
    <p>This is a test website deployed via the Vercel API.</p>
    <p>Static HTML, no build step, no framework.</p>
    <p class="meta">Project: <code>bay-area-extremes</code></p>
  </div>
</body>
</html>
